name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BETTER_AUTH_SECRET: "ci-only-secret-ci-only-secret-ci-only"
      BETTER_AUTH_URL: "http://localhost:3001"
      CI: "true"
      CORS_ORIGIN: "http://localhost:3001"
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/agentkogei"
      GITHUB_CLIENT_ID: "ci-only-github-client"
      GITHUB_CLIENT_SECRET: "ci-only-github-secret"
      HUSKY: "0"
      POLAR_ACCESS_TOKEN: "ci-only-polar-token"
      POLAR_SUCCESS_URL: "http://localhost:3001/success"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check-types

      - name: Build
        run: bun run build

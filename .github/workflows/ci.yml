name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Type-check, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BETTER_AUTH_SECRET: "ci-only-secret-ci-only-secret-ci-only"
      BETTER_AUTH_URL: "http://localhost:3001"
      CI: "true"
      CORS_ORIGIN: "http://localhost:3001"
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/agentkogei"
      GITHUB_CLIENT_ID: "ci-only-github-client"
      GITHUB_CLIENT_SECRET: "ci-only-github-secret"
      HUSKY: "0"
      POLAR_ACCESS_TOKEN: "ci-only-polar-token"
      POLAR_SUCCESS_URL: "http://localhost:3001/success"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      # The published CLI targets Node.js 20+, so the runner matrix runs on the
      # oldest runtime AgentKogei advertises rather than the runner's default.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check-types

      - name: Build
        run: bun run build

      # The black-box journeys drive a real browser against the built product.
      # Their database is embedded, so no service container is required.
      - name: Install the black-box browser
        run: bun x playwright install --with-deps chromium
        working-directory: apps/web

      - name: Test
        run: bun run test

      - name: Upload black-box failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: black-box-evidence
          path: |
            apps/web/test-results
            apps/web/.black-box/application.log
          if-no-files-found: ignore
          retention-days: 7
